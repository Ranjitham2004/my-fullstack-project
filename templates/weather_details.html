<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Details - CropWiseX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success"> <!-- same navbar as before --> </nav>

    <div class="container mt-5">
        <h1 class="text-center mb-4">Weather Details</h1>
        <div class="card">
            <div class="card-body">
                <h5>Current Weather:</h5>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">📍 Place: {{ weather.city }}</li>
                    <li class="list-group-item">🌡️ Temperature: {{ weather.temperature }} °C</li>
                    <li class="list-group-item">💧 Humidity: {{ weather.humidity }} %</li>
                    <li class="list-group-item">☁️ Condition: {{ weather.description }}</li>
                    <li class="list-group-item">🌧️ Rainfall: {{ weather.rainfall }} mm</li>
                </ul>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
